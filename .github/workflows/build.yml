name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.1)"
        required: true
        default: "v0.0.1"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            name: macOS-arm64
          # - platform: macos-13
          #   target: x86_64-apple-darwin
          #   name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      # === Windows code signing: import certificate ===
      - name: Import Windows code signing certificate
        if: runner.os == 'Windows'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "No Windows certificate provided, skipping code signing."
            exit 0
          }
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          $tempFile = [System.IO.Path]::GetTempFileName() + ".pfx"
          [System.IO.File]::WriteAllBytes($tempFile, $certBytes)
          $store = New-Object System.Security.Cryptography.X509Certificates.X509Store("My", "CurrentUser")
          $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($tempFile, $env:WINDOWS_CERTIFICATE_PASSWORD, [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable)
          $store.Add($cert)
          $store.Close()
          Remove-Item $tempFile
          # Patch thumbprint into tauri.conf.json
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle.windows.certificateThumbprint = $cert.Thumbprint
          $config | ConvertTo-Json -Depth 10 | Set-Content $configPath
          Write-Host "Certificate imported, thumbprint: $($cert.Thumbprint)"

      # === macOS: write notarization API key to file ===
      - name: Prepare Apple API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          if [ -z "$APPLE_API_KEY_CONTENT" ]; then
            echo "No Apple API key provided, skipping notarization setup."
            exit 0
          fi
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" >> "$GITHUB_ENV"

      # === Check if macOS signing secrets are configured ===
      - name: Check macOS signing configuration
        if: runner.os == 'macOS'
        id: check-signing
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No Apple signing certificate configured, building without code signing."
          fi

      - name: Build Tauri app (macOS with signing)
        if: runner.os == 'macOS' && steps.check-signing.outputs.has_signing == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "KeyVault ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See the assets to download for your platform."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # Build without Apple Developer ID: use ad-hoc signing so that macOS
      # shows the "无法验证开发者" dialog (which exposes a "仍要打开" button
      # in 系统设置 → 隐私与安全性), instead of the "已损坏" dialog that
      # appears when the bundle is completely unsigned.
      - name: Build Tauri app (macOS without signing)
        if: runner.os == 'macOS' && steps.check-signing.outputs.has_signing != 'true'
        run: |
          bunx tauri build --target ${{ matrix.target }} --config '{"bundle": {"macOS": {"signingIdentity": "-", "entitlements": null}}}'

          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/KeyVault.app"

          # 重新进行 ad-hoc 签名，确保 bundle 内所有可执行文件签名一致，
          # 这样 Gatekeeper 才会走"未识别开发者"流程（可在隐私与安全性中放行），
          # 而不是直接报"已损坏"。
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload macOS unsigned artifacts to release
        if: runner.os == 'macOS' && steps.check-signing.outputs.has_signing != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "KeyVault ${{ inputs.tag || github.ref_name }}"
          body: |
            See the assets to download for your platform.

            ### macOS 安装说明（未签名版本）
            此版本未经 Apple 开发者签名，首次打开时 macOS 会提示「无法验证开发者」。请按以下步骤放行：

            1. 将 `KeyVault.app` 拖入 `应用程序` 文件夹。
            2. 在 `启动台` 或 `应用程序` 中**双击** `KeyVault`，会弹出「无法打开，因为无法验证开发者」的提示，点击「完成」。
            3. 打开 `系统设置` → `隐私与安全性`，滚动到底部，会看到一条提示：「已阻止使用"KeyVault"，因为来自身份不明的开发者」，点击右侧的 **「仍要打开」**。
            4. 在弹出的确认对话框中再次点击 **「仍要打开」**，按提示输入密码或使用 Touch ID 验证即可。

            之后再打开应用就不会再有提示了。
          draft: true
          prerelease: false
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Build Tauri app (non-macOS)
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "KeyVault ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See the assets to download for your platform."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
